<script>
/* ===================== STORAGE ===================== */
const Store={mem:{},
  async get(k){
    try{if(window.storage){const r=await window.storage.get(k);return r?JSON.parse(r.value):null;}}catch(e){}
    try{if(window.localStorage){const v=localStorage.getItem(k);return v?JSON.parse(v):null;}}catch(e){}
    return k in this.mem?this.mem[k]:null;
  },
  async set(k,v){
    this.mem[k]=v;
    try{if(window.storage){await window.storage.set(k,JSON.stringify(v));return;}}catch(e){}
    try{if(window.localStorage){localStorage.setItem(k,JSON.stringify(v));return;}}catch(e){}
  }
};
const K={users:'fa:users',session:'fa:session',companies:u=>`fa:u:${u}:companies`,cats:c=>`fa:co:${c}:categories`,assets:c=>`fa:co:${c}:assets`,org:c=>`fa:co:${c}:org`,refs:c=>`fa:co:${c}:refs`,cloud:'fa:cloud'};

/* ===================== CLOUD SYNC (SUPABASE) ===================== */
let cloudCfg=null;            // {url,key}
const CLOUD=()=>!!(cloudCfg&&Cloud.ready);
const Cloud={
  sb:null, ready:false,
  init(cfg){
    if(typeof supabase==='undefined'||!supabase.createClient) return false;
    if(!cfg||!cfg.url||!cfg.key) return false;
    try{ this.sb=supabase.createClient(cfg.url,cfg.key,{auth:{persistSession:true,autoRefreshToken:true,storageKey:'fa-supabase-auth'}}); this.ready=true; return true; }catch(e){ this.ready=false; return false; }
  },

/* ===================== CRYPTO ===================== */
function randHex(n){const a=new Uint8Array(n);crypto.getRandomValues(a);return[...a].map(b=>b.toString(16).padStart(2,'0')).join('');}
async function hashPw(pw,salt){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(salt+'::'+pw));return[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');}

async function boot(){
  cloudCfg=await Store.get(K.cloud);
  if(cloudCfg){ Cloud.init(cloudCfg); }
  if(CLOUD()){
    try{ const u=await Cloud.currentUser(); if(u){ state.user={id:u.id,email:u.email,name:(u.user_metadata&&u.user_metadata.name)||u.email}; await afterLogin(); return; } }catch(e){}
    renderAuth('login'); return;
  }
  const sess=await Store.get(K.session);
  const users=await Store.get(K.users)||[];
  if(sess&&sess.userId){const u=users.find(x=>x.id===sess.userId);if(u){state.user={id:u.id,name:u.name,email:u.email};await afterLogin(sess.companyId);return;}}
  renderAuth('login');
}
async function afterLogin(preferCompanyId){
  state.companies=await dlLoadCompanies();
  if(!state.companies.length){renderFirstCompany();return;}
  const co=state.companies.find(c=>c.id===preferCompanyId)||state.companies[0];
  await loadCompany(co.id);
}
async function loadCompany(cid){
  const co=state.companies.find(c=>c.id===cid);if(!co)return;
  state.activeCompany=co;
  state.settings={company:co.name,currency:co.currency||'ر.س'};
  if(CLOUD()){
    try{ const d=await Cloud.loadCompany(cid); state.categories=d.categories; state.orgNodes=d.org; state.refs=d.refs; state.assets=d.assets; }
    catch(e){ console.error(e); toast('تعذّر تحميل بيانات الشركة'); state.categories=seedCats();state.orgNodes=seedOrg(co.name);state.refs={employees:[],costCenters:[],suppliers:[]};state.assets=[]; }
  }else{
    let cats=await Store.get(K.cats(cid));
    if(!cats||!cats.length){cats=seedCats();await Store.set(K.cats(cid),cats);}
    state.categories=cats;
    let org=await Store.get(K.org(cid));
    if(!org||!org.length){org=seedOrg(co.name);await Store.set(K.org(cid),org);}
    state.orgNodes=org;
    state.refs=await Store.get(K.refs(cid))||{employees:[],costCenters:[],suppliers:[]};
    state.assets=await Store.get(K.assets(cid))||[];
    await Store.set(K.session,{userId:state.user.id,companyId:cid});
  }
  state.selCat='all';state.search='';state.view='dash';state.reportKey='register';
  render();
}

function monthsBetween(a,b){if(!a)return 0;const s=new Date(a),e=new Date(b);let m=(e.getFullYear()-s.getFullYear())*12+(e.getMonth()-s.getMonth());if(e.getDate()<s.getDate())m-=1;return Math.max(0,m);}

function catPath(id){const map={};state.categories.forEach(c=>map[c.id]=c);const out=[];let cur=map[id],g=0;while(cur&&g++<10){out.unshift(cur.name);cur=cur.parentId?map[cur.parentId]:null;}return out.join(' / ')||'—';}

function orgDescendants(id){const out=[id],st=[id];while(st.length){const p=st.pop();state.orgNodes.filter(n=>n.parentId===p).forEach(n=>{out.push(n.id);st.push(n.id);});}return out;}

/* ===================== DEPRECIATION ===================== */
function capitalized(a){return (+a.initialCost||0)+(+a.taxCost||0)+(+a.transportCost||0)+(+a.installCost||0);}
function assetCost(a){const add=(a.additions||[]).reduce((s,x)=>s+(+x.amount||0),0);const red=(a.reductions||[]).reduce((s,x)=>s+(+x.amount||0),0);return capitalized(a)+add-red;}
const FREQ={annual:{l:'سنوي',n:1},quarter:{l:'ربع سنوي',n:4},monthly:{l:'شهري',n:12}};
const METHODS={straight:'القسط الثابت',declining:'القسط المتناقص',ddb:'القسط المتناقص المضاعف',syd:'مجموع أرقام السنوات',units:'وحدات الإنتاج'};
function sydDeps(base,life){const tot=life*(life+1)/2;const arr=[];for(let k=1;k<=life;k++)arr.push(base*((life-k+1)/tot));return arr;}
function depreciation(a,asOf){
  const cost=assetCost(a),salvage=+a.salvageValue||0,base=Math.max(0,cost-salvage),life=+a.usefulLifeYears||0,method=a.method||'straight';
  let endDate=asOf;if((a.status==='disposed'||a.status==='sold')&&a.disposal&&a.disposal.date&&a.disposal.date<asOf)endDate=a.disposal.date;
  const monthsEl=monthsBetween(a.acquisitionDate,endDate);
  let accumulated=0,annual=0;
  if(method==='units'){
    const tot=+a.totalUnits||0,used=+a.unitsUsed||0;const per=tot>0?base/tot:0;accumulated=Math.min(base,per*used);annual=per*(+a.unitsPerYear||0);
  }else if(method==='declining'||method==='ddb'){
    const rate=method==='ddb'?(life>0?2/life:0):((+a.decliningRate||0)/100);
    let nbv=cost,m=monthsEl;while(m>0&&nbv>salvage){const step=Math.min(12,m);const yd=Math.min(nbv*rate*(step/12),nbv-salvage);accumulated+=yd;nbv-=yd;m-=step;}
    annual=Math.min(cost*rate,base);
  }else if(method==='syd'&&life>0){
    const deps=sydDeps(base,life);const fy=Math.floor(monthsEl/12),frac=(monthsEl%12)/12;
    for(let k=0;k<life;k++){if(k<fy)accumulated+=deps[k];else if(k===fy)accumulated+=deps[k]*frac;}
    annual=deps[0]||0;
  }else{const monthly=life>0?base/(life*12):0;accumulated=Math.min(monthly*monthsEl,base);annual=monthly*12;}
  accumulated=Math.min(Math.max(0,accumulated),base);
  const nbv=cost-accumulated;const pct=base>0?Math.min(100,accumulated/base*100):0;
  const freq=FREQ[a.depFreq||'annual']||FREQ.annual;
  return{cost,salvage,base,annual,monthly:annual/12,periodAmount:annual/freq.n,periodLabel:freq.l,method,accumulated,nbv,pct,life,monthsEl};
}
function schedule(a){
  const cost=assetCost(a),salvage=+a.salvageValue||0,life=+a.usefulLifeYears||0,method=a.method||'straight',rows=[];let acc=0,nbv=cost;
  const startY=a.acquisitionDate?new Date(a.acquisitionDate).getFullYear():new Date().getFullYear();
  if(method==='units')return rows;
  if(method==='declining'||method==='ddb'){const rate=method==='ddb'?(life>0?2/life:0):((+a.decliningRate||0)/100);for(let y=0;y<Math.max(life,1)&&nbv>salvage+0.01&&y<40;y++){const open=nbv;let dep=Math.min(open*rate,open-salvage);if(dep<0)dep=0;acc+=dep;nbv=open-dep;rows.push({year:startY+y,open,dep,acc,close:nbv});if(dep<=0)break;}}
  else if(method==='syd'&&life>0){const deps=sydDeps(Math.max(0,cost-salvage),life);for(let y=0;y<life;y++){const open=nbv;const dep=deps[y];acc+=dep;nbv=open-dep;rows.push({year:startY+y,open,dep,acc,close:nbv});}}
  else{const base=Math.max(0,cost-salvage),annual=life>0?base/life:0;for(let y=0;y<life;y++){const open=nbv;let dep=Math.min(annual,open-salvage);if(dep<0)dep=0;acc+=dep;nbv=open-dep;rows.push({year:startY+y,open,dep,acc,close:nbv});}}
  return rows;
}
function totals(list){let cost=0,acc=0,nbv=0,maint=0;list.forEach(a=>{const d=depreciation(a,state.asOf);cost+=d.cost;acc+=d.accumulated;nbv+=d.nbv;maint+=(a.maintenance||[]).reduce((s,m)=>s+(+m.cost||0),0);});return{cost,acc,nbv,maint,count:list.length};}

  if(CLOUD()){cn.innerHTML=`${I.shield.replace(/currentColor/g,'#0E6E63').replace('width="1.8"','width="1.4"')} متصل بخادم Supabase — بياناتك تُحفظ سحابياً وتتزامن عبر الأجهزة والمستخدمين. <a id="cloudCfg" style="color:var(--primary);font-weight:700;cursor:pointer">تغيير/فصل</a>`;}
  else{cn.innerHTML=`${I.shield.replace(/currentColor/g,'#8A98AC').replace('width="1.8"','width="1.4"')} الوضع المحلي: البيانات على هذا الجهاز فقط. <a id="cloudCfg" style="color:var(--primary);font-weight:700;cursor:pointer">الاتصال بخادم سحابي للمزامنة عبر الأجهزة</a>`;}
  $('#cloudCfg').onclick=()=>openCloudConfig();
  const err=m=>{const e=$('#aerr');e.textContent=m;e.style.display='block';};
  $('#a-switch').onclick=()=>renderAuth(mode==='login'?'signup':'login');
  const submit=async()=>{
    const email=($('#a-email').value||'').trim().toLowerCase();const pass=$('#a-pass').value||'';
    if(!email||!pass){err('أدخل البريد وكلمة المرور');return;}
    if(CLOUD()){
      try{
        if(mode==='signup'){const name=($('#a-name').value||'').trim();const pass2=$('#a-pass2').value||'';if(!name){err('أدخل اسمك');return;}if(pass.length<6){err('كلمة المرور 6 أحرف على الأقل');return;}if(pass!==pass2){err('كلمتا المرور غير متطابقتين');return;}const u=await Cloud.signUp(email,pass,name);state.user={id:u.id,email:u.email,name};await afterLogin();}
        else{const u=await Cloud.signIn(email,pass);state.user={id:u.id,email:u.email,name:(u.user_metadata&&u.user_metadata.name)||email};await afterLogin();}
      }catch(e){err((e&&e.message)||'تعذّر تسجيل الدخول');}
      return;
    }
    const users=await Store.get(K.users)||[];
    if(mode==='signup'){
      const name=($('#a-name').value||'').trim();const pass2=$('#a-pass2').value||'';
      if(!name){err('أدخل اسمك');return;}
      if(pass.length<6){err('كلمة المرور 6 أحرف على الأقل');return;}
      if(pass!==pass2){err('كلمتا المرور غير متطابقتين');return;}
      if(users.some(u=>u.email===email)){err('هذا البريد مسجّل مسبقاً');return;}
      const salt=randHex(8);const passHash=await hashPw(pass,salt);
      const u={id:_id(),name,email,salt,passHash};users.push(u);await Store.set(K.users,users);
      state.user={id:u.id,name:u.name,email:u.email};await Store.set(K.session,{userId:u.id});
      renderFirstCompany();
    }else{
      const u=users.find(x=>x.email===email);if(!u){err('بيانات الدخول غير صحيحة');return;}
      const h=await hashPw(pass,u.salt);if(h!==u.passHash){err('بيانات الدخول غير صحيحة');return;}
      state.user={id:u.id,name:u.name,email:u.email};await Store.set(K.session,{userId:u.id});await afterLogin();
    }
  };
  $('#a-submit').onclick=submit;
  ['a-pass','a-pass2'].forEach(id=>{const el=$('#'+id);if(el)el.onkeydown=e=>{if(e.key==='Enter')submit();};});
}

      if(edit){state.activeCompany.name=name;state.activeCompany.currency=currency;state.settings={company:name,currency};await saveCompanies();close();render();toast('تم الحفظ');}
      else{const co=await dlCreateCompany({name,currency});state.companies=await dlLoadCompanies();close();await loadCompany(co.id);toast('تمت إضافة الشركة');}

  };

    if(!confirm('سيتم حذف الشركة وكل أصولها نهائياً. متابعة؟'))return;

    try{
      if(CLOUD()){await Cloud.deleteCompany(id);}
      else{await Store.set(K.cats(id),[]);await Store.set(K.assets(id),[]);await Store.set(K.org(id),[]);await Store.set(K.refs(id),{employees:[],costCenters:[],suppliers:[]});}

      if(state.companies.length)await loadCompany(state.companies[0].id);else renderFirstCompany();
      toast('تم حذف الشركة');
    }catch(e){toast((e&&e.message)||'تعذّر الحذف');}
  };
}

/* ===================== DASHBOARD ===================== */
function alertsData(){
  const warr=[],ins=[],maint=[];const Y=new Date().getFullYear();
  state.assets.forEach(a=>{if(a.status&&a.status!=='active')return;
    const w=daysUntil(a.warrantyExpiry);if(a.warrantyExpiry&&w!==null&&w<=60)warr.push({a,d:w});
    const i=daysUntil(a.insuranceExpiry);if(a.insuranceExpiry&&i!==null&&i<=60)ins.push({a,d:i});
    const nm=daysUntil(a.nextMaintenance);if(a.nextMaintenance&&nm!==null&&nm<=30)maint.push({a,d:nm});
  });
  warr.sort((x,y)=>x.d-y.d);ins.sort((x,y)=>x.d-y.d);maint.sort((x,y)=>x.d-y.d);
  const newThis=state.assets.filter(a=>a.acquisitionDate&&new Date(a.acquisitionDate).getFullYear()===Y).length;

function bindAssetModal(isNew){
  const close=()=>$('#ov').remove();
  $('#close').onclick=close;$('#cancel').onclick=close;$('#ov').onclick=e=>{if(e.target.id==='ov')close();};
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{collectBasic();_tab=b.dataset.tab;$('#ov').remove();drawAssetModal(isNew);});
  if($('#f-method'))$('#f-method').onchange=e=>{const v=e.target.value;const rw=$('#rateWrap');if(rw)rw.style.display=v==='declining'?'':'none';const uw=$('#unitsWrap');if(uw)uw.style.display=v==='units'?'':'none';};
  if($('#f-image'))$('#f-image').onchange=e=>{const f=e.target.files[0];if(!f)return;readImage(f,dataUrl=>{collectBasic();_editing.image=dataUrl;$('#ov').remove();drawAssetModal(isNew);});};
  if($('#rmImage'))$('#rmImage').onclick=()=>{collectBasic();_editing.image='';$('#ov').remove();drawAssetModal(isNew);};
  if($('#printLabel'))$('#printLabel').onclick=()=>printLabel(_editing);
  if($('#doTransfer'))$('#doTransfer').onclick=()=>{collectBasic();const toId=$('#tr-org').value,toEmp=($('#tr-emp').value||'').trim();const _d=depreciation(_editing,$('#tr-date').value||todayStr());const mv={id:_id(),date:$('#tr-date').value,fromOrgId:_editing.orgId,toOrgId:toId,fromOrg:orgPath(_editing.orgId),fromEmp:_editing.responsibleEmployee||'',toOrg:toId?orgPath(toId):orgPath(_editing.orgId),toEmp:toEmp||_editing.responsibleEmployee||'',type:$('#tr-type').value,returnDate:$('#tr-return').value||'',reason:$('#tr-reason').value||'',cost:round2(_d.cost),acc:round2(_d.accumulated),nbv:round2(_d.nbv)};_editing.movements=_editing.movements||[];_editing.movements.push(mv);if(toId)_editing.orgId=toId;if(toEmp){_editing.responsibleEmployee=toEmp;pushRef('employees',toEmp);}$('#ov').remove();drawAssetModal(isNew);toast('تم تسجيل الحركة');};
  document.querySelectorAll('[data-addline]').forEach(b=>b.onclick=()=>{collectBasic();const k=b.dataset.addline,date=$('#'+k+'-date').value,desc=$('#'+k+'-desc').value,amt=+$('#'+k+'-amt').value||0;if(!amt){toast('أدخل المبلغ');return;}const arr=k==='add'?'additions':'reductions';_editing[arr]=_editing[arr]||[];_editing[arr].push({id:_id(),date,description:desc,amount:amt});$('#ov').remove();drawAssetModal(isNew);});
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{collectBasic();const[k,i]=b.dataset.del.split(':');const arr=k==='add'?'additions':'reductions';_editing[arr].splice(+i,1);$('#ov').remove();drawAssetModal(isNew);});
  if($('#addMaint'))$('#addMaint').onclick=()=>{collectBasic();const cost=+$('#m-cost').value||0;_editing.maintenance=_editing.maintenance||[];_editing.maintenance.push({id:_id(),date:$('#m-date').value,type:$('#m-type').value,vendor:$('#m-vendor').value,cost});$('#ov').remove();drawAssetModal(isNew);};
  document.querySelectorAll('[data-delm]').forEach(b=>b.onclick=()=>{collectBasic();_editing.maintenance.splice(+b.dataset.delm,1);$('#ov').remove();drawAssetModal(isNew);});
  if($('#d-type'))$('#d-type').onchange=e=>{const w=$('#dispFields');if(w)w.style.display=e.target.value?'':'none';};
  $('#save').onclick=async()=>{collectBasic();if(!_editing.name||!_editing.name.trim()){_tab='basic';$('#ov').remove();drawAssetModal(isNew);toast('أدخل اسم الأصل');return;}pushRef('employees',_editing.responsibleEmployee);pushRef('costCenters',_editing.costCenter);pushRef('suppliers',_editing.supplier);const idx=state.assets.findIndex(x=>x.id===_editing.id);if(idx>=0)state.assets[idx]=_editing;else state.assets.push(_editing);await persistAsset(_editing);close();render();toast('تم حفظ الأصل');};
  if($('#delAsset'))$('#delAsset').onclick=async()=>{if(!confirm('هل تريد حذف هذا الأصل نهائياً؟'))return;state.assets=state.assets.filter(x=>x.id!==_editing.id);await removeAssetRow(_editing.id);close();render();toast('تم حذف الأصل');};
}

function drawCatModal(){
  const roots=state.categories.filter(c=>!c.parentId);
  function row(c,depth){return `<div class="li" style="grid-template-columns:1fr auto;margin-right:${depth*16}px"><span><b style="${depth?'':'color:var(--primary-deep)'}">${esc(c.name)}</b> <span class="tcode">${esc(c.code||'')}</span></span><span style="display:flex;gap:4px"><button class="btn sm ghost" data-addsub="${c.id}" title="إضافة فرع">${I.plus}</button><button class="btn sm ghost" data-editcat="${c.id}">${I.edit}</button><button class="btn sm ghost" data-delcat="${c.id}" style="color:var(--neg)">${I.trash}</button></span></div>${state.categories.filter(x=>x.parentId===c.id).map(k=>row(k,depth+1)).join('')}`;}
  const ov=document.createElement('div');ov.className='overlay';ov.id='ovc';
  ov.innerHTML=`<div class="modal sm"><div class="modal-h"><div><h3>إدارة تصنيفات الأصول</h3><div class="msub">المجموعات الرئيسية والفرعية</div></div><button class="x" id="cclose">${I.x}</button></div>
  <div class="modal-b"><div class="add-line" style="grid-template-columns:1fr 1fr auto;display:grid;align-items:end;margin-bottom:16px"><div class="field" style="margin:0"><label>اسم المجموعة الرئيسية</label><input id="c-name" placeholder="مثال: المعدات الطبية"></div><div class="field" style="margin:0"><label>الكود</label><input id="c-code" placeholder="70"></div><button class="btn pri sm" id="addRoot" style="height:38px">${I.plus}إضافة</button></div>
  <div class="line-list">${roots.length?roots.map(r=>row(r,0)).join(''):'<div class="li muted">لا توجد تصنيفات</div>'}</div></div>
  <div class="modal-f"><span class="muted" style="font-size:12px">اضغط + بجانب أي مجموعة لإضافة فرع تحتها</span><button class="btn pri" id="cdone">تم</button></div></div>`;
  document.body.appendChild(ov);
  const close=()=>{$('#ovc').remove();render();};
  $('#cclose').onclick=close;$('#cdone').onclick=close;$('#ovc').onclick=e=>{if(e.target.id==='ovc')close();};
  $('#addRoot').onclick=async()=>{const n=$('#c-name').value.trim();if(!n){toast('أدخل اسم المجموعة');return;}state.categories.push({id:_id(),name:n,code:$('#c-code').value.trim(),parentId:null});await saveCats();$('#ovc').remove();drawCatModal();};
  document.querySelectorAll('[data-addsub]').forEach(b=>b.onclick=async()=>{const n=prompt('اسم الفرع الجديد:');if(!n)return;const code=prompt('كود الفرع (اختياري):')||'';state.categories.push({id:_id(),name:n.trim(),code:code.trim(),parentId:b.dataset.addsub});await saveCats();$('#ovc').remove();drawCatModal();});
  document.querySelectorAll('[data-editcat]').forEach(b=>b.onclick=async()=>{const c=state.categories.find(x=>x.id===b.dataset.editcat);const n=prompt('اسم التصنيف:',c.name);if(n===null)return;c.name=n.trim();const code=prompt('الكود:',c.code||'');if(code!==null)c.code=code.trim();await saveCats();$('#ovc').remove();drawCatModal();});
  document.querySelectorAll('[data-delcat]').forEach(b=>b.onclick=async()=>{const id=b.dataset.delcat;if(state.categories.some(x=>x.parentId===id)){toast('احذف الفروع أولاً');return;}if(state.assets.some(a=>a.categoryId===id)){toast('لا يمكن الحذف: يوجد أصول مرتبطة');return;}if(!confirm('حذف هذا التصنيف؟'))return;state.categories=state.categories.filter(x=>x.id!==id);await saveCats();$('#ovc').remove();drawCatModal();});
}

/* ===================== EXPORT ===================== */
function exportBtn(id){return `<div class="exp"><button class="btn" id="${id}">${I.down}تصدير ${I.chevd}</button></div>`;}
function bindExport(id,getData){
  const btn=$('#'+id);if(!btn)return;
  btn.onclick=e=>{e.stopPropagation();const ex=btn.parentElement;let m=ex.querySelector('.exp-menu');if(m){m.remove();return;}
    m=document.createElement('div');m.className='exp-menu';
    m.innerHTML=`<button data-x="xlsx"><span class="xl">${I.sheet}</span> تصدير Excel</button><button data-x="csv"><span class="cv">${I.report}</span> تصدير CSV</button><button data-x="pdf"><span class="pd">${I.print}</span> تصدير PDF (طباعة)</button>`;
    ex.appendChild(m);
    m.querySelectorAll('[data-x]').forEach(b=>b.onclick=()=>{m.remove();const d=getData();if(b.dataset.x==='pdf'){window.print();}else if(b.dataset.x==='csv'){exportCSV(d.headers,d.rows,d.name);}else{exportXLSX(d.headers,d.rows,d.name,d.totals);}});
    setTimeout(()=>document.addEventListener('click',function cl(ev){if(!ev.target.closest('.exp')){m.remove();document.removeEventListener('click',cl);}}),0);
  };
}
function exportRows(list,name){
  const headers=['كود الأصل','الباركود','اسم الأصل','التصنيف','الفرع/الموقع التنظيمي','الموقع التفصيلي','الموظف المسؤول','مركز التكلفة','المورّد','الشركة المصنعة','الموديل','الرقم التسلسلي','تاريخ الشراء','تاريخ التشغيل','التكلفة الإجمالية','إجمالي الإضافات','التكلفة الحالية','طريقة الإهلاك','تكرار الإهلاك','العمر الإنتاجي','القيمة المتبقية','القسط السنوي','مجمع الإهلاك','صافي القيمة الدفترية','انتهاء الضمان','انتهاء التأمين','الحالة'];
  const rows=list.map(a=>{const d=depreciation(a,state.asOf);const add=(a.additions||[]).reduce((s,x)=>s+(+x.amount||0),0);const st=a.disposal&&a.disposal.type?DISPOSAL_TYPES[a.disposal.type]:({active:'قيد التشغيل',sold:'تم بيعه',disposed:'مستبعد'})[a.status||'active'];return [a.code||'',a.barcode||'',a.name||'',catPath(a.categoryId),orgPath(a.orgId),a.location||'',a.responsibleEmployee||'',a.costCenter||'',a.supplier||'',a.manufacturer||'',a.model||'',a.serial||'',a.acquisitionDate||'',a.operationDate||'',round2(capitalized(a)),add,d.cost,METHODS[a.method||'straight'],(FREQ[a.depFreq||'annual']||FREQ.annual).l,a.usefulLifeYears||0,a.salvageValue||0,round2(d.annual),round2(d.accumulated),round2(d.nbv),a.warrantyExpiry||'',a.insuranceExpiry||'',st];});
  const t=totals(list);
  const totalsRow=['الإجمالي','','','','','','','','','','','','','',round2(list.reduce((s,a)=>s+capitalized(a),0)),'',round2(t.cost),'','','','',round2(list.reduce((s,a)=>s+depreciation(a,state.asOf).annual,0)),round2(t.acc),round2(t.nbv),'','',''];
  return {headers,rows,name:name+'_'+state.activeCompany.name,totals:totalsRow};
}
function round2(n){return Math.round((+n||0)*100)/100;}
function exportCSV(headers,rows,name){
  const cell=v=>{v=String(v==null?'':v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const csv=[headers.map(cell).join(','),...rows.map(r=>r.map(cell).join(','))].join('\n');
  download(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}),name+'.csv');toast('تم تصدير CSV');
}
function exportXLSX(headers,rows,name,totalsRow){
  if(typeof XLSX==='undefined'){toast('مكتبة Excel غير محمّلة، تم التصدير كـ CSV');exportCSV(headers,rows,name);return;}
  const aoa=[[state.activeCompany.name],['سجل الأصول الثابتة كما في '+state.asOf],[],headers,...rows];
  if(totalsRow)aoa.push(totalsRow);
  const ws=XLSX.utils.aoa_to_sheet(aoa);ws['!cols']=headers.map(h=>({wch:Math.max(12,h.length+2)}));
  const wb=XLSX.utils.book_new();wb.Workbook={Views:[{RTL:true}]};XLSX.utils.book_append_sheet(wb,ws,'الأصول');
  XLSX.writeFile(wb,name+'.xlsx');toast('تم تصدير Excel');
}

function assetSelectOptions(sel){
  const list=state.assets.filter(a=>(a.status||'active')==='active').sort((a,b)=>(a.code||'').localeCompare(b.code||''));
  return '<option value="">— اختر الأصل —</option>'+list.map(a=>`<option value="${a.id}" ${sel===a.id?'selected':''}>${esc((a.code?a.code+' · ':'')+a.name)}</option>`).join('');
}
function allMovements(){
  const out=[];
  state.assets.forEach(a=>(a.movements||[]).forEach((m,i)=>out.push({a,m,i})));
  out.sort((x,y)=>(y.m.date||'').localeCompare(x.m.date||''));
  return out;
}

function reportData(key){
  const L=state.assets.slice();
  const grp=(keyFn,label)=>{const map={};L.forEach(a=>{const k=keyFn(a)||'—';(map[k]=map[k]||[]).push(a);});const arr=Object.keys(map).map(k=>({k,t:totals(map[k])})).sort((a,b)=>b.t.cost-a.t.cost);const rows=arr.map(x=>[x.k,x.t.count,round2(x.t.cost),round2(x.t.acc),round2(x.t.nbv)]);const tt=totals(L);return{headers:[label,'العدد','التكلفة','مجمع الإهلاك','صافي القيمة'],rows,totalsRow:['الإجمالي',tt.count,round2(tt.cost),round2(tt.acc),round2(tt.nbv)],numCols:[2,3,4]};};
  switch(key){
    case 'byBranch':return{title:'الأصول حسب الفرع/الموقع التنظيمي',...grp(a=>orgRootOf(a.orgId)?orgName(orgRootOf(a.orgId)):'—','الفرع')};
    case 'byCat':return{title:'الأصول حسب النوع (التصنيف)',...grp(a=>catName(a.categoryId),'التصنيف')};
    case 'byEmp':return{title:'الأصول حسب الموظف المسؤول',...grp(a=>a.responsibleEmployee||'—','الموظف المسؤول')};
    case 'byCC':return{title:'الأصول حسب مركز التكلفة',...grp(a=>a.costCenter||'—','مركز التكلفة')};
    case 'byStatus':return{title:'الأصول حسب الحالة',...grp(a=>a.disposal&&a.disposal.type?DISPOSAL_TYPES[a.disposal.type]:({active:'قيد التشغيل',sold:'مباع',disposed:'مستبعد'})[a.status||'active'],'الحالة')};
    case 'byAge':return{title:'الأصول حسب العمر',...grp(a=>{const y=a.acquisitionDate?Math.floor(monthsBetween(a.acquisitionDate,state.asOf)/12):0;return y<1?'أقل من سنة':y<3?'1 - 3 سنوات':y<5?'3 - 5 سنوات':y<10?'5 - 10 سنوات':'أكثر من 10 سنوات';},'الفئة العمرية')};
    case 'dep':{const A=L.filter(a=>(a.status||'active')==='active');const rows=A.map(a=>{const d=depreciation(a,state.asOf);return[a.code||'',a.name||'',METHODS[a.method||'straight'],round2(d.monthly),round2(d.annual),round2(d.accumulated),round2(d.nbv)];});return{title:'الإهلاك الشهري والسنوي',headers:['الكود','الأصل','الطريقة','القسط الشهري','القسط السنوي','مجمع الإهلاك','صافي القيمة'],rows,totalsRow:['الإجمالي','','',round2(rows.reduce((s,r)=>s+r[3],0)),round2(rows.reduce((s,r)=>s+r[4],0)),round2(rows.reduce((s,r)=>s+r[5],0)),round2(rows.reduce((s,r)=>s+r[6],0))],numCols:[3,4,5,6]};}
    case 'lost':{const rows=L.filter(a=>a.disposal&&['loss','theft'].includes(a.disposal.type)).map(a=>[a.code||'',a.name||'',orgPath(a.orgId),DISPOSAL_TYPES[a.disposal.type],a.disposal.date||'',round2(depreciation(a,state.asOf).nbv)]);return{title:'الأصول المفقودة والمسروقة',headers:['الكود','الأصل','الموقع','النوع','التاريخ','صافي القيمة وقت الفقد'],rows,numCols:[5]};}
    case 'damaged':{const rows=L.filter(a=>a.condition==='تالف').map(a=>[a.code||'',a.name||'',orgPath(a.orgId),a.responsibleEmployee||'—',round2(depreciation(a,state.asOf).nbv)]);return{title:'الأصول التالفة',headers:['الكود','الأصل','الموقع','المسؤول','صافي القيمة'],rows,numCols:[4]};}
    case 'warranty':{const rows=L.filter(a=>a.warrantyExpiry).map(a=>({r:[a.code||'',a.name||'',a.warrantyExpiry],d:daysUntil(a.warrantyExpiry)})).sort((x,y)=>x.d-y.d).map(o=>[...o.r,o.d<0?`منتهٍ منذ ${-o.d} يوم`:`متبقٍ ${o.d} يوم`]);return{title:'حالة الضمانات وتواريخ الانتهاء',headers:['الكود','الأصل','انتهاء الضمان','المتبقي'],rows};}
    case 'insurance':{const rows=L.filter(a=>a.insuranceExpiry).map(a=>({r:[a.code||'',a.name||'',a.insuranceCompany||'—',a.insuranceExpiry],d:daysUntil(a.insuranceExpiry)})).sort((x,y)=>x.d-y.d).map(o=>[...o.r,o.d<0?`منتهٍ منذ ${-o.d} يوم`:`متبقٍ ${o.d} يوم`]);return{title:'حالة التأمينات وتواريخ الانتهاء',headers:['الكود','الأصل','شركة التأمين','انتهاء التأمين','المتبقي'],rows};}

    case 'maintLog':{const rows=[];L.forEach(a=>(a.maintenance||[]).forEach(m=>rows.push([m.date||'',a.code||'',a.name||'',m.type||'',m.vendor||'',round2(m.cost)])));rows.sort((x,y)=>(y[0]||'').localeCompare(x[0]||''));return{title:'سجل أعمال الصيانة',headers:['التاريخ','كود الأصل','الأصل','النوع','المهندس/الجهة','التكلفة'],rows,totalsRow:['الإجمالي','','','','',round2(rows.reduce((s,r)=>s+r[5],0))],numCols:[5]};}
    case 'movements':{const rows=[];L.forEach(a=>(a.movements||[]).forEach(m=>rows.push([m.date||'',a.code||'',a.name||'',m.fromOrg||'',m.toOrg||'',m.type==='temporary'?'مؤقت':'دائم'])));rows.sort((x,y)=>(y[0]||'').localeCompare(x[0]||''));return{title:'سجل حركة الأصول (النقل/الإعارة)',headers:['التاريخ','كود الأصل','الأصل','من','إلى','النوع'],rows};}
  }
  return{title:'',headers:[],rows:[]};
}

async function handleImport(f){
  try{
    let records=[];
    if(/\.csv$/i.test(f.name)){
      const rows=parseCSV(await f.text());if(rows.length<2){toast('الملف فارغ');return;}
      const hd=rows[0].map(h=>h.trim());records=rows.slice(1).filter(r=>r.some(c=>String(c).trim())).map(r=>{const o={};hd.forEach((h,i)=>o[h]=r[i]);return o;});
    }else{
      if(typeof XLSX==='undefined'){toast('مكتبة Excel غير محمّلة، استخدم CSV');return;}
      const wb=XLSX.read(new Uint8Array(await f.arrayBuffer()),{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];
      let arr=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      // skip leading title rows: find header row containing a known field
      let hi=arr.findIndex(r=>r.some(c=>FIELD_MAP[String(c).trim()]));if(hi<0)hi=0;
      const hd=arr[hi].map(h=>String(h).trim());
      records=arr.slice(hi+1).filter(r=>r.some(c=>String(c).trim())).map(r=>{const o={};hd.forEach((h,i)=>o[h]=r[i]);return o;});
    }
    if(!records.length){toast('لا توجد صفوف بيانات');return;}
    let added=0;
    for(const rec of records){
      const a=newAsset();a.code='';a.name='';a.description='';a.location='';a.model='';a.acquisitionDate='';a.initialCost=0;a.usefulLifeYears=5;a.orgId=(state.orgNodes[0]||{}).id||'';
      let catVal='';
      Object.keys(rec).forEach(h=>{const key=FIELD_MAP[h.trim()];if(!key)return;const v=rec[h];
        if(key==='_cat')catVal=String(v||'').trim();
        else if(key==='_org'){const ov=String(v||'').trim();if(ov)a.orgId=resolveOrg(ov);}
        else if(key==='_method'){const s=String(v);a.method=/مضاعف|double/i.test(s)?'ddb':/أرقام|syd|sum/i.test(s)?'syd':/وحدات|unit/i.test(s)?'units':/متناقص|declin/i.test(s)?'declining':'straight';}
        else if(['initialCost','salvageValue','usefulLifeYears','taxCost','transportCost','installCost'].includes(key))a[key]=+String(v).replace(/[^\d.\-]/g,'')||0;
        else if(key==='acquisitionDate'||key==='operationDate')a[key]=normDate(v);
        else a[key]=String(v==null?'':v).trim();
      });
      if(catVal){a.categoryId=resolveCategory(catVal);}
      pushRef('employees',a.responsibleEmployee);pushRef('costCenters',a.costCenter);pushRef('suppliers',a.supplier);
      if(!a.name)continue;
      state.assets.push(a);added++;
    }
    await saveCats();await saveOrg();await saveRefs();await saveAssets();
    const ir=$('#impResult');if(ir){ir.innerHTML=`<div class="stat-banner" style="background:var(--primary-tint);color:var(--primary-deep)">${I.box}<div>تم استيراد <b>${added}</b> أصل بنجاح. <a style="color:var(--primary-deep);font-weight:700;cursor:pointer" id="goAssets">عرض السجل ←</a></div></div>`;const g=$('#goAssets');if(g)g.onclick=()=>{state.view='assets';render();};}
    toast('تم استيراد '+added+' أصل');
  }catch(err){console.error(err);toast('تعذّر قراءة الملف');}
}
function resolveCategory(val){
  const low=val.toLowerCase();
  let c=state.categories.find(x=>(x.name||'').toLowerCase()===low||(x.code||'').toLowerCase()===low);
  if(c)return c.id;
  c=state.categories.find(x=>(x.name||'').toLowerCase().includes(low)||low.includes((x.name||'').toLowerCase()));
  if(c)return c.id;
  const nc={id:_id(),name:val,code:'',parentId:null};state.categories.push(nc);return nc.id;
}
function resolveOrg(val){
  const low=val.toLowerCase();
  let n=state.orgNodes.find(x=>(x.name||'').toLowerCase()===low);
  if(n)return n.id;
  n=state.orgNodes.find(x=>(x.name||'').toLowerCase().includes(low)||low.includes((x.name||'').toLowerCase()));
  if(n)return n.id;
  const nn={id:_id(),name:val,type:'branch',parentId:null};state.orgNodes.push(nn);saveOrg();return nn.id;
}
function normDate(v){
  if(v==null||v==='')return '';
  if(typeof v==='number'){const d=new Date(Math.round((v-25569)*86400*1000));return isNaN(d)?'':d.toISOString().slice(0,10);}
  const s=String(v).trim();const d=new Date(s);if(!isNaN(d)&&/\d{4}/.test(s))return d.toISOString().slice(0,10);
  return s;
}
function parseCSV(text){text=text.replace(/^\uFEFF/,'');const rows=[];let i=0,field='',row=[],q=false;while(i<text.length){const c=text[i];if(q){if(c=='"'){if(text[i+1]=='"'){field+='"';i++;}else q=false;}else field+=c;}else{if(c=='"')q=true;else if(c==',' ){row.push(field);field='';}else if(c=='\n'){row.push(field);rows.push(row);row=[];field='';}else if(c=='\r'){}else field+=c;}i++;}if(field.length||row.length){row.push(field);rows.push(row);}return rows;}

  :`<div class="card" style="padding:22px;margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">

      <button class="btn pri sm" id="cloudConnect">${I.shield}تفعيل المزامنة السحابية</button></div></div>`;
  return shellHead('الإعدادات والبيانات الأساسية','بيانات الشركة، المزامنة، الهيكل الإداري والتصنيفات')+`

views._bind_settings=function(){
  $('#saveSet').onclick=async()=>{state.activeCompany.name=$('#s-company').value||state.activeCompany.name;state.activeCompany.currency=$('#s-cur').value||'ر.س';state.settings={company:state.activeCompany.name,currency:state.activeCompany.currency};await saveCompanies();render();toast('تم حفظ الإعدادات');};
  $('#openCats').onclick=openCatModal;
  $('#openOrg').onclick=openOrgModal;
  $('#editCo').onclick=()=>openCompanyModal(true);
  $('#addCo').onclick=()=>openCompanyModal(false);
  $('#resetData').onclick=async()=>{if(!confirm('سيتم مسح جميع أصول هذه الشركة نهائياً (تبقى التصنيفات والهيكل). متابعة؟'))return;state.assets=[];await clearAssetsRows();render();toast('تم مسح الأصول');};
  document.querySelectorAll('[data-addref]').forEach(b=>b.onclick=async()=>{const k=b.dataset.addref;const v=($('#ref-'+k).value||'').trim();if(!v)return;state.refs[k]=state.refs[k]||[];if(!state.refs[k].includes(v))state.refs[k].push(v);await saveRefs();render();});
  document.querySelectorAll('[data-rmref]').forEach(b=>b.onclick=async()=>{const[k,i]=b.dataset.rmref.split(':');state.refs[k].splice(+i,1);await saveRefs();render();});
  // cloud sync bindings
  if($('#cloudConnect'))$('#cloudConnect').onclick=()=>openCloudConfig();
  if($('#cloudChange'))$('#cloudChange').onclick=()=>openCloudConfig();
  if($('#cloudRefresh'))$('#cloudRefresh').onclick=async()=>{await loadCompany(state.activeCompany.id);toast('تم تحديث البيانات');};
  if($('#copyWs'))$('#copyWs').onclick=()=>{const t=state.activeCompany.id;try{navigator.clipboard.writeText(t);}catch(e){const i=$('#wsid');i.select&&i.select();}toast('تم نسخ المعرّف');};
  if($('#joinBtn'))$('#joinBtn').onclick=async()=>{const id=($('#joinId').value||'').trim();if(!id){toast('أدخل المعرّف');return;}try{await Cloud.joinCompany(id);state.companies=await dlLoadCompanies();await loadCompany(id);toast('تم الانضمام لمساحة العمل');}catch(e){toast((e&&e.message)||'تعذّر الانضمام');}};

async function loadMembers(){
  const box=$('#membersBox');if(!box)return;
  try{
    const mem=await Cloud.members(state.activeCompany.id);
    const isOwner=state.activeCompany.owner===state.user.id;
    box.innerHTML=mem.length?mem.map(m=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px"><div><div style="font-weight:600;font-size:12.5px">${esc(m.email||m.user_id)}</div><div class="muted" style="font-size:11px">${m.role==='owner'?'المالك':'محرّر'}</div></div>${isOwner&&m.role!=='owner'?`<button class="btn sm ghost" data-rmmem="${esc(m.user_id)}" style="color:var(--neg)">${I.trash}</button>`:''}</div>`).join(''):'<div class="muted" style="font-size:12px">لا أعضاء</div>';
    box.querySelectorAll('[data-rmmem]').forEach(b=>b.onclick=async()=>{if(!confirm('إزالة هذا العضو؟'))return;try{await Cloud.removeMember(state.activeCompany.id,b.dataset.rmmem);loadMembers();toast('تمت الإزالة');}catch(e){toast('تعذّرت الإزالة');}});
  }catch(e){box.innerHTML='<div class="muted" style="font-size:12px">تعذّر تحميل الأعضاء</div>';}
}

/* ===================== ORG STRUCTURE MODAL ===================== */
function openOrgModal(){drawOrgModal();}
function drawOrgModal(){
  const roots=state.orgNodes.filter(n=>!n.parentId);
  function row(n,depth){return `<div class="li" style="grid-template-columns:1fr auto;margin-right:${depth*16}px"><span><b style="${depth?'':'color:var(--primary-deep)'}">${esc(n.name)}</b> <span class="tcode">${ORG_TYPES[n.type]||''}</span></span><span style="display:flex;gap:4px"><button class="btn sm ghost" data-addorg="${n.id}" title="إضافة وحدة فرعية">${I.plus}</button><button class="btn sm ghost" data-editorg="${n.id}">${I.edit}</button><button class="btn sm ghost" data-delorg="${n.id}" style="color:var(--neg)">${I.trash}</button></span></div>${state.orgNodes.filter(x=>x.parentId===n.id).map(k=>row(k,depth+1)).join('')}`;}
  const typeOpts=Object.keys(ORG_TYPES).map(k=>`<option value="${k}">${ORG_TYPES[k]}</option>`).join('');
  const ov=document.createElement('div');ov.className='overlay';ov.id='ovo';
  ov.innerHTML=`<div class="modal sm"><div class="modal-h"><div><h3>الهيكل الإداري</h3><div class="msub">الشركة ← الفروع ← الإدارات ← الأقسام ← المواقع ← الغرف/المخازن</div></div><button class="x" id="oclose">${I.x}</button></div>
  <div class="modal-b"><div class="add-line" style="grid-template-columns:1fr 1fr auto;display:grid;align-items:end;margin-bottom:16px"><div class="field" style="margin:0"><label>اسم وحدة رئيسية (فرع)</label><input id="o-name" placeholder="مثال: فرع الرياض"></div><div class="field" style="margin:0"><label>النوع</label><select id="o-type">${typeOpts}</select></div><button class="btn pri sm" id="addOrgRoot" style="height:38px">${I.plus}إضافة</button></div>
  <div class="line-list">${roots.length?roots.map(r=>row(r,0)).join(''):'<div class="li muted">لا يوجد هيكل</div>'}</div></div>
  <div class="modal-f"><span class="muted" style="font-size:12px">اضغط + لإضافة وحدة فرعية</span><button class="btn pri" id="odone">تم</button></div></div>`;
  document.body.appendChild(ov);
  const close=()=>{$('#ovo').remove();render();};
  $('#oclose').onclick=close;$('#odone').onclick=close;$('#ovo').onclick=e=>{if(e.target.id==='ovo')close();};
  $('#addOrgRoot').onclick=async()=>{const n=$('#o-name').value.trim();if(!n){toast('أدخل الاسم');return;}state.orgNodes.push({id:_id(),name:n,type:$('#o-type').value,parentId:null});await saveOrg();$('#ovo').remove();drawOrgModal();};
  document.querySelectorAll('[data-addorg]').forEach(b=>b.onclick=async()=>{const n=prompt('اسم الوحدة الفرعية:');if(!n)return;const types=Object.keys(ORG_TYPES).map((k,i)=>`${i+1}- ${ORG_TYPES[k]}`).join('  ');const ti=prompt('النوع:\n'+types+'\nأدخل الرقم:','2');const keys=Object.keys(ORG_TYPES);const type=keys[(+ti||2)-1]||'department';state.orgNodes.push({id:_id(),name:n.trim(),type,parentId:b.dataset.addorg});await saveOrg();$('#ovo').remove();drawOrgModal();});
  document.querySelectorAll('[data-editorg]').forEach(b=>b.onclick=async()=>{const n=state.orgNodes.find(x=>x.id===b.dataset.editorg);const v=prompt('الاسم:',n.name);if(v===null)return;n.name=v.trim();await saveOrg();$('#ovo').remove();drawOrgModal();});
  document.querySelectorAll('[data-delorg]').forEach(b=>b.onclick=async()=>{const id=b.dataset.delorg;if(state.orgNodes.some(x=>x.parentId===id)){toast('احذف الوحدات الفرعية أولاً');return;}if(state.assets.some(a=>a.orgId===id)){toast('لا يمكن الحذف: يوجد أصول مرتبطة');return;}if(!confirm('حذف هذه الوحدة؟'))return;state.orgNodes=state.orgNodes.filter(x=>x.id!==id);await saveOrg();$('#ovo').remove();drawOrgModal();});
}

boot();
